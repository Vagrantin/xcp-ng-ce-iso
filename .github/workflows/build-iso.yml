name: Build XCP-ng Community Edition ISO

on:
  push:
    tags:
      - 'v*-ce[0-9]*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Emergency release'
        required: false 

jobs:
  build-iso:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 180

    steps:
      # ── 0. Checkout xcp-ng-ce-iso ─────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive versions from tag or input
        run: |
          TAG="${{ github.ref_name || github.event.inputs.release_tag }}"
          # v8.3-ce4  →  XCPNG_VER=8.3  CE_BUILD=4
          XCPNG_VER=$(echo "${TAG}" | sed 's/^v//;s/-ce.*//')
          echo "XCPNG_VER=${XCPNG_VER}" >> $GITHUB_ENV
          echo "RELEASE_TAG=${TAG}"      >> $GITHUB_ENV
          echo " XCP-ng version: ${XCPNG_VER} release: ${TAG}"

      # ── 1. Import GPG key on the runner ───────────────────────────────────
      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Import passphrase-protected key
          echo "${GPG_PRIVATE_KEY}" | gpg --batch --pinentry-mode loopback \
            --passphrase "${GPG_PASSPHRASE}" --import

          # Configure gpg-agent for non-TTY passphrase delivery
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent
          sleep 1

          # Pre-cache passphrase in agent for all subsequent signing
          echo "${GPG_PASSPHRASE}" | gpg --batch --pinentry-mode loopback \
            --passphrase-fd 0 --quiet --no-tty \
            -u "XCP-ng Community Edition" \
            --sign --output /dev/null /dev/null

          GPG_KEY_ID=$(gpg --list-secret-keys --with-colons 2>/dev/null \
            | awk -F: '/^sec/{print $5}' | head -1)
          echo "GPG_KEY_ID=${GPG_KEY_ID}" >> $GITHUB_ENV
          echo "GPG_PASSPHRASE=${GPG_PASSPHRASE}" >> $GITHUB_ENV
          echo "▶ GPG key imported: ${GPG_KEY_ID}" 

      # ── 2. Clone the official ISO build toolchain ─────────────────────────
      - name: Clone create-install-image
        run: |
          git clone -b master https://github.com/xcp-ng/create-install-image.git
          echo "▶ Toolchain cloned (master branch)"
          ls create-install-image/scripts/

      # ── 4. Fetch the signed community xo-lite-ce RPM ──────────────────────
      - name: Fetch community xo-lite RPM
        run: |
          RPM_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository_owner }}/xolite-ce/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith(".rpm")) | .browser_download_url')
          
          test -n "${RPM_URL}" || { echo "Failed to find RPM asset"; exit 1; }
          
          # Extract the actual filename dynamically (e.g. xo-lite-ce-0.8.0-1.noarch.rpm)
          PACKAGE_NAME=$(basename "${RPM_URL}")
          echo "XOLITE-CE_FILENAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "▶ Detected filename: ${PACKAGE_NAME}"

          wget -q -O "${PACKAGE_NAME}" "${RPM_URL}"

      # ── 4b. Fetch the signed community xoa-proxy RPM ──────────────────────
      - name: Fetch xoa-proxy RPM
        run: |
          RPM_URL=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/Vagrantin/xoa-proxy/releases/latest" \
            | jq -r '.assets[] | select(.name | endswith(".rpm")) | .browser_download_url')

          test -n "${RPM_URL}" || { echo "Failed to find xoa-proxy RPM asset"; exit 1; }

          PACKAGE_NAME=$(basename "${RPM_URL}")
          echo "XOA_PROXY_FILENAME=${PACKAGE_NAME}" >> $GITHUB_ENV
          echo "▶ Detected filename: ${PACKAGE_NAME}"

          wget -q -O "${PACKAGE_NAME}" "${RPM_URL}"

      # ── 5. Build local community RPM repo ─────────────────────────────────
      - name: Create and Sign community RPM repo
        run: |
          sudo apt-get install -y createrepo-c -qq
          mkdir -p community-repo/x86_64
          cp "${{ env.XOLITE-CE_FILENAME }}" community-repo/x86_64/
          cp "${{ env.XOA_PROXY_FILENAME }}" community-repo/x86_64/
          createrepo_c community-repo/x86_64
          # Sign the metadata of the community repo (agent has cached passphrase)
          gpg --batch --pinentry-mode loopback \
            --detach-sign --armor \
            community-repo/x86_64/repodata/repomd.xml

      # ── 6. Pull the official build environment ────────────────────────────
      - name: Pull xcp-ng-build-env
        run: |
          docker pull ghcr.io/xcp-ng/xcp-ng-build-env:${XCPNG_VER}

      # ── 7. Export GPG private key for container ───────────────────────────
      - name: Export GPG key for container
        run: |
          # Export private key — passphrase required to decrypt key material for export
          gpg --batch --armor --pinentry-mode loopback \
            --passphrase "${GPG_PASSPHRASE}" \
            --export-secret-keys "${GPG_KEY_ID}" > /tmp/community-signing.key
          gpg --armor --export "${GPG_KEY_ID}" > /tmp/RPM-GPG-KEY-xcp-ng-ce
          chmod 600 /tmp/community-signing.key

      # ── 8. Build ISO inside the container ─────────────────────────────────
      - name: Build toolchain image with dependencies
        run: |
          cat > Dockerfile.build <<EOF
          FROM ghcr.io/xcp-ng/xcp-ng-build-env:${XCPNG_VER}
          RUN yum install -y -q \
                genisoimage syslinux grub-tools createrepo_c libfaketime && \
              yum install -y -q --enablerepo=epel gnupg1 && \
              curl -sL https://xcp-ng.org/RPM-GPG-KEY-xcpng \
              -o /etc/pki/rpm-gpg/RPM-GPG-KEY-xcpng 
          EOF
          docker build -f Dockerfile.build -t xcp-ng-build-local .
      
      - name: Bake GPG key into image
        run: |
          # gpg1 (classic GnuPG) requires passphrase via --passphrase flag
          CONTAINER_ID=$(docker run -d \
            --user root \
            -e "GPG_PASSPHRASE=${GPG_PASSPHRASE}" \
            -v "/tmp/community-signing.key:/community-signing.key:ro" \
            xcp-ng-build-local \
            bash -c 'gpg1 --batch --passphrase "${GPG_PASSPHRASE}" \
              --import /community-signing.key')
          docker wait "${CONTAINER_ID}"
          docker commit "${CONTAINER_ID}" xcp-ng-build-ready
          docker rm "${CONTAINER_ID}"

      - name: Prepare create-install-image for custom repo
        run: |
          # Ensure the destination directory exists for the specific version
          mkdir -p create-install-image/configs/${XCPNG_VER}
          
          # Copy customized template into the toolchain's version-specific config dir
          cp create-install-image/configs/base/* create-install-image/configs/${XCPNG_VER}/
          cp -f configs/repo/CUSTOMREPO.tmpl create-install-image/configs/${XCPNG_VER}/CUSTOMREPO.tmpl
          
          # Use the dynamic filename to discover the internal package name (e.g. xo-lite-ce)
          PKG_NAME=$(rpm -qp "${{ env.XOLITE-CE_FILENAME }}" --qf '%{NAME}')
          echo "Discovered internal package name: ${PKG_NAME}"
          sed -i 's/^xo-lite$/${PKG_NAME}/' create-install-image/configs/${XCPNG_VER}/packages.lst
          
          echo "▶ Custom repo template deployed for XCP-ng ${XCPNG_VER}"

      - name: Inject Community GPG key into toolchain templates
        run: |
          mkdir -p create-install-image/templates/installimg/base/etc/pki/rpm-gpg/
          cp /tmp/RPM-GPG-KEY-xcp-ng-ce create-install-image/templates/installimg/base/etc/pki/rpm-gpg/
          curl -sL https://xcp-ng.org/RPM-GPG-KEY-xcpng -o create-install-image/templates/installimg/base/etc/pki/rpm-gpg/RPM-GPG-KEY-xcpng

      - name: Patch toolchain with git
        run: |
          cd create-install-image
          git apply ../patches/multi-key-support.patch

          if grep -q "allmatches" scripts/create-installimg.sh; then
            echo "Toolchain patched successfully"
          else
            echo "Patch verification failed"
            exit 1
          fi
          
      - name: Build install.img
        run: |
          docker run --rm \
            --user root -w /tmp \
            -v "$(pwd)/create-install-image:/create-install-image:ro" \
            -v "/tmp/RPM-GPG-KEY-xcp-ng-ce:/etc/pki/rpm-gpg/RPM-GPG-KEY-xcp-ng-ce" \
            -v "$(pwd)/community-repo:/community-repo:ro" \
            -v "$(pwd):/output" \
            xcp-ng-build-ready \
            bash -ce "
              rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-xcpng 
              rpm --import /etc/pki/rpm-gpg/RPM-GPG-KEY-xcp-ng-ce 
              echo '--- Local Repo Contents ---'
              ls -lR /community-repo

              /create-install-image/scripts/create-installimg.sh \
                --output /output/install-${XCPNG_VER}.img \
                --define-repo community!file:///community-repo \
                --define-repo base!https://updates.xcp-ng.org/8/${XCPNG_VER}/base \
                --define-repo updates!https://updates.xcp-ng.org/8/${XCPNG_VER}/updates \
                --verbose \
                ${XCPNG_VER}
            echo 'install.img built'
            "

      - name: Build ISO
        run: |
          OUTPUT="xcp-ng-ce-${XCPNG_VER}.iso"
          VOLID="XCP-ng CE ${XCPNG_VER}"

          sudo chown -R 1000:1000 .

          docker run --rm \
            --user builder \
            -w /home/builder \
            -e GPG_KEY_ID="${GPG_KEY_ID}" \
            -v "$(pwd)/create-install-image:/create-install-image:ro" \
            -v "$(pwd)/community-repo:/community-repo:ro" \
            -v "$(pwd):/output" \
            xcp-ng-build-ready \
            bash -c "
              /create-install-image/scripts/create-iso.sh \
                -V \"${VOLID}\" \
                --output /output/${OUTPUT} \
                --force-overwrite \
                --define-repo community!file:///community-repo \
                --define-repo base!https://updates.xcp-ng.org/8/${XCPNG_VER}/base \
                --define-repo updates!https://updates.xcp-ng.org/8/${XCPNG_VER}/updates \
                --verbose \
                ${XCPNG_VER} /output/install-${XCPNG_VER}.img
            "
          echo "OUTPUT=${OUTPUT}" >> $GITHUB_ENV
          
      - name: Restore working directory ownership
        run: sudo chown -R $(id -u):$(id -g) .

      # ── 9. Verification & Cleanup ─────────────────────────────────────────
      - name: Remove GPG private key
        if: always()
        run: shred -u /tmp/community-signing.key || true

      - name: Verify community RPM in ISO
        run: |
          sudo apt-get install -y xorriso -qq
          mkdir -p /tmp/iso-check
          xorriso -osirrox on -indev "${OUTPUT}" -extract /Packages /tmp/iso-check/
          echo "▶ Contents of ISO Packages directory:"
          ls -l /tmp/iso-check
          
          # Verify based on the new 'xo-lite-ce' naming pattern
          find /tmp/iso-check -name "xo-lite-ce*.rpm" | grep -q "xo-lite-ce" || {
            echo "Verification failed: New xo-lite-ce RPM not found in ISO"
            exit 1
          }
          echo "Verification successful"

      # ── 10. Checksum and sign ─────────────────────────────────────────────
      - name: Generate and sign SHA256SUMS
        run: |
          CHECKSUM_FILE="${OUTPUT}.sha256"
          sha256sum "${OUTPUT}" > "${CHECKSUM_FILE}"
          echo "CHECKSUM_FILE=${CHECKSUM_FILE}" >> $GITHUB_ENV
          echo "▶ Checksum:"
          cat "${CHECKSUM_FILE}"

          gpg --batch --pinentry-mode loopback \
            --detach-sign --armor \
            "${CHECKSUM_FILE}"
          # produces ${OUTPUT}.sha256.asc

          echo "▶ Verifying signature before publish:"
          gpg --verify "${CHECKSUM_FILE}.asc" "${CHECKSUM_FILE}"

      # ── 11. Publish Release ───────────────────────────────────────────────
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          body: |
            ## XCP-ng Community Edition ISO
            Unofficial community build of XCP-ng ${{ env.XCPNG_VER }}.

            ### Release files

            | File | Purpose |
            |---|---|
            | `xcp-ng-ce-${{ env.XCPNG_VER }}.iso` | Bootable installer ISO |
            | `xcp-ng-ce-${{ env.XCPNG_VER }}.iso.sha256` | SHA256 checksum of the ISO |
            | `xcp-ng-ce-${{ env.XCPNG_VER }}.iso.sha256.asc` | GPG signature over the checksum file |

            ### Verify before installing

            Verification works in two steps: first you confirm the checksum file
            was signed by this project, then you confirm the ISO matches that checksum.
            Both steps are required.

            **1. Download all three files into the same directory**

            All files must be in the same directory — `sha256sum -c` looks for
            the ISO by name in the current directory.

            ```bash
            cd ~/Downloads
            # download the three files listed above from this release page
            ```

            **2. Import the community GPG key (one-time)**

            ```bash
            gpg --keyserver keys.openpgp.org \
                --recv-keys 2F591DB9D2C128C4C3D963F46DA00DCA5BBA215A
            ```

            **3. Verify the checksum file is authentic**

            This confirms the checksum file was produced by this project and has
            not been tampered with.

            ```bash
            gpg --verify xcp-ng-ce-${{ env.XCPNG_VER }}.iso.sha256.asc \
                         xcp-ng-ce-${{ env.XCPNG_VER }}.iso.sha256
            ```

            Expected output:
            ```
            gpg: Good signature from "XCP-ng Community Edition <xcp-ng-ce.lid530@passmail.com>"
            ```

            If you see `BAD signature` — stop. The checksum file has been tampered with.

            **4. Verify the ISO matches the signed checksum**

            This confirms the ISO file is intact and matches what was released.

            ```bash
            sha256sum -c xcp-ng-ce-${{ env.XCPNG_VER }}.iso.sha256
            ```

            Expected output:
            ```
            xcp-ng-ce-${{ env.XCPNG_VER }}.iso: OK
            ```

            If you see `FAILED` — the ISO is corrupted. Delete it and re-download.

            ---
            > XCP-ng Community Edition is an independent community project.
            > Not affiliated with or supported by Vates SAS or the XCP-ng project.
          files: |
            ${{ env.OUTPUT }}
            ${{ env.CHECKSUM_FILE }}
            ${{ env.CHECKSUM_FILE }}.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
